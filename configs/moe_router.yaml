# Router configuration placeholder.
# Main design: route to task-specific LoRA adapters on one shared frozen VLM
# backbone, not to separate full models.

experiment:
  name: router_selected_lora_experts
  stage: scaffold

backbone:
  model_id: Qwen/Qwen2-VL-2B-Instruct
  frozen: true
  implementation_status: planned

router:
  type: instruction_aware
  predicts:
    - chartqa
    - docvqa
    - textvqa
  implementation_status: todo

experts:
  chartqa:
    adapter_name: LoRA_chartqa
    adapter_type: lora
  docvqa:
    adapter_name: LoRA_docvqa
    adapter_type: lora
  textvqa:
    adapter_name: LoRA_textvqa
    adapter_type: lora
