# Qwen2-VL LoRA expert design.
# This config is scaffold-only: it defines the intended experts and checkpoint
# paths, but does not train or load adapters yet.

experiment:
  name: qwen2vl_task_specific_lora_experts
  stage: design

backbone:
  model_id: Qwen/Qwen2.5-VL-7B-Instruct
  frozen: true
  role: shared_vision_language_backbone

lora_defaults:
  rank: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - v_proj

experts:
  chartqa:
    expert_id: 1
    adapter_name: LoRA_chartqa
    train_dataset: chartqa
    checkpoint_dir: outputs/checkpoints/qwen2vl_lora_chartqa
    description: Chart reading, numerical values, axes, legends, and plotted data.

  docvqa:
    expert_id: 2
    adapter_name: LoRA_docvqa
    train_dataset: docvqa
    checkpoint_dir: outputs/checkpoints/qwen2vl_lora_docvqa
    description: Document QA over forms, receipts, layouts, tables, and OCR-heavy pages.

  textvqa:
    expert_id: 3
    adapter_name: LoRA_textvqa
    train_dataset: textvqa
    checkpoint_dir: outputs/checkpoints/qwen2vl_lora_textvqa
    description: Natural-image QA that requires reading text in the scene.

planned_shared_experts:
  shared_ocr:
    expert_id: 101
    adapter_name: LoRA_shared_ocr
    checkpoint_dir: outputs/checkpoints/qwen2vl_lora_shared_ocr
    description: Planned shared adapter for OCR-heavy behavior common to DocVQA and TextVQA.

  shared_reasoning:
    expert_id: 102
    adapter_name: LoRA_shared_reasoning
    checkpoint_dir: outputs/checkpoints/qwen2vl_lora_shared_reasoning
    description: Planned shared adapter for general visual reasoning common across tasks.

router:
  input:
    - question
    - instruction
    - optional_dataset_metadata
  output:
    - chartqa
    - docvqa
    - textvqa
  selection_target: lora_adapter
  does_not_select: full_model
  logging:
    print_selected_expert: true
    log_fields:
      - sample_id
      - expert_id
      - predicted_task_type
      - adapter_name
      - true_task_type
      - correct
      - confidence

inference_flow:
  - receive_image_and_question
  - predict_task_type
  - select_matching_lora_adapter
  - run_shared_frozen_qwen2vl_backbone_with_selected_adapter
  - generate_answer
